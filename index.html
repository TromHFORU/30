<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 30 | Unit Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="user">
            <h1>Meteric/Imperal Unit Conversion</h1>
            <input id="input-el" type="number" min="0" step="any">
            <button id="btn-el">Convert</button>
        </div>
        
    </div>
    <div class="cal">
            <h2>Length(Meter/Feet)</h2>
            <p id="result-meter"></p><br>
        </div>
    <div class="cal">
            <h2>Volume(Litre/Gallon)</h2>
            <p id="result-litre"></p><br>
        </div>
    <div class="cal" >
            <h2>Weight(Kilogram/Pound)</h2>
            <p id="result-kilo"></p><br>
        </div>
    <script src="script.js"></script>
</body>
</html>
